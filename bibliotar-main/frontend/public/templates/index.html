<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Frontend</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .section { margin-bottom: 30px; border: 1px solid #ccc; padding: 15px; }
        .error { color: red; font-weight: bold; }
        .success { color: green; font-weight: bold; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    {% raw %}
    <div id="app">
        <h3 :class="messageType" v-if="message">{{ message }}</h3>

        <div class="section" v-if="!loggedIn">
            <div style="display: flex; gap: 40px;">
                <div>
                    <h3>Login</h3>
                    <form @submit.prevent="login">
                        <input type="text" v-model="loginData.username" placeholder="Full Name" required><br><br>
                        <input type="password" v-model="loginData.password" placeholder="Password" required><br><br>
                        <button type="submit">Login</button>
                    </form>
                </div>

                <div>
                    <h3>Register</h3>
                    <form @submit.prevent="register">
                        <input type="text" v-model="registerData.name" placeholder="Full Name" required><br><br>
                        <input type="email" v-model="registerData.email" placeholder="Email" required><br><br>
                        <input type="password" v-model="registerData.password" placeholder="Password" required><br><br>
                        <input type="text" v-model="registerData.address" placeholder="Address" required><br><br>
                        <input type="text" v-model="registerData.phone" placeholder="Phone Number" required><br><br>
                        <button type="submit">Register</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="section" v-if="loggedIn">
            <span>Welcome, {{ currentUser }}! | </span>
            <button @click="logout">Logout</button>
        </div>

        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>List of Books</h3>
                <div>
                    <input type="text" placeholder="Search..." v-model="searchQuery" @keyup.enter="searchBooks">
                    <button @click="searchBooks">Search</button>
                </div>
            </div>
            
            <p v-if="books.length === 0">Loading books or no books found...</p>

            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>ISBN</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="book in books" :key="book.id">
                        <td><strong>{{ book.title }}</strong></td>
                        <td>{{ book.isbn }}</td>
                        <td>
                            <div v-if="loggedIn">
                                <button @click="borrowAsUser(book.id)">Advance Booking</button>
                            </div>
                            <div v-else>
                                <form @submit.prevent="borrowAsGuest(book.id)" style="display: flex; gap: 5px;">
                                    <input type="text" v-model="guestData[book.id].name" placeholder="Name" required style="width: 100px;">
                                    <input type="text" v-model="guestData[book.id].address" placeholder="Address" required style="width: 100px;">
                                    <input type="text" v-model="guestData[book.id].phone" placeholder="Phone" required style="width: 100px;">
                                    <button type="submit">Borrow as Guest</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
    {% endraw %}
    <script>
        const { createApp } = Vue
        const API_BASE = ''; 

        createApp({
            data() {
                return {
                    books: [],
                    loggedIn: false,
                    currentUser: '',
                    message: '',
                    messageType: '',
                    searchQuery: '',
                    loginData: { username: '', password: '' },
                    registerData: { name: '', email: '', password: '', address: '', phone: '' },
                    guestData: {} 
                }
            },
            methods: {
                showMessage(msg, type = 'success') {
                    this.message = msg;
                    this.messageType = type;
                    setTimeout(() => { this.message = ''; }, 4000);
                },

                async fetchBooks() {
                    try {
                        const response = await fetch(`/books`);
                        if (!response.ok) throw new Error('Network error');
                        this.books = await response.json();
                        
                        this.books.forEach(book => {
                            if (!this.guestData[book.id]) {
                                this.guestData[book.id] = { name: '', address: '', phone: '' };
                            }
                        });
                    } catch (error) {
                        this.showMessage("Hiba a könyvek betöltésekor (Vagy az API még nem létezik).", 'error');
                    }
                },
                
                async login() {
                    try {
                        const response = await fetch(`/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.loginData)
                        });
                        const result = await response.json();
                        
                        if (response.ok && result.success !== false) {
                            this.loggedIn = true;
                            this.currentUser = this.loginData.username; 
                            this.showMessage('Sikeres belépés!');
                            this.loginData = { username: '', password: '' }; 
                        } else {
                            this.showMessage(result.message || 'Hibás adatok!', 'error');
                        }
                    } catch (error) {
                        this.showMessage("Szerver hiba.", 'error');
                    }
                },

                async register() {
                    try {
                        const response = await fetch(`/register`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.registerData)
                        });
                        
                        if (response.ok) {
                            this.showMessage('Sikeres regisztráció! Most már bejelentkezhetsz.');
                            this.registerData = { name: '', email: '', password: '', address: '', phone: '' }; 
                        } else {
                            const result = await response.json();
                            this.showMessage(result.message || 'Hiba regisztrációkor.', 'error');
                        }
                    } catch (error) {
                        this.showMessage("Szerver hiba regisztrációkor.", 'error');
                    }
                },

                async logout() {
                    try {
                        await fetch(`/logout`, { method: 'POST' });
                        this.loggedIn = false;
                        this.currentUser = '';
                        this.showMessage('Kijelentkezve.');
                    } catch (error) {}
                },

                async borrowAsUser(bookId) {
                    try {
                        const response = await fetch(`/books/${bookId}/booking`, { 
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' }
                        });
                        if (response.ok) {
                            this.showMessage('Sikeres kölcsönzés!');
                            this.fetchBooks(); 
                        }
                    } catch (error) {}
                },

                async borrowAsGuest(bookId) {
                    try {
                        const response = await fetch(`/guest_borrow/${bookId}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.guestData[bookId])
                        });
                        if (response.ok) {
                            this.showMessage('Sikeres vendég kölcsönzés!');
                            this.fetchBooks(); 
                        }
                    } catch (error) {}
                },

                async searchBooks() {
                    if (!this.searchQuery) return this.fetchBooks();
                    try {
                        const response = await fetch(`/books?keyword=${this.searchQuery}`);
                        if (response.ok) {
                            this.books = await response.json();
                        }
                    } catch(e) {}
                }
            },
            mounted() {
                this.fetchBooks();
            }
        }).mount('#app')
    </script>
</body>
</html>
